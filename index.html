<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz · Derecho Civil · Semana 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0A1F3D;
    --navy2:   #123164;
    --navy3:   #1A4A8A;
    --sky:     #4A90D9;
    --sky2:    #6AAEE8;
    --skylt:   #A8CFEE;
    --white:   #FFFFFF;
    --off:     #F0F6FB;
    --slate:   #4A6080;
    --green:   #2E7D32;
    --greenlt: #4CAF50;
    --red:     #C62828;
    --redlt:   #EF5350;
    --orange:  #E65100;
    --gold:    #F9A825;
    --silver:  #90A4AE;
    --bronze:  #8D6E63;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── PANTALLAS ── */
  .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
  .screen.active { display: flex; }

  /* ── PANTALLA INICIO ── */
  #screen-start {
    background: var(--navy);
    position: relative;
    overflow: hidden;
  }
  #screen-start::before {
    content: '';
    position: absolute;
    top: -120px; right: -120px;
    width: 420px; height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,144,217,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  #screen-start::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,144,217,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .start-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .18em;
    color: var(--sky);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  .start-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(2.4rem, 8vw, 4rem);
    font-weight: 900;
    line-height: 1;
    text-align: center;
    margin-bottom: .4rem;
  }
  .start-title span { color: var(--sky); }
  .start-sub {
    font-size: 1rem;
    color: var(--skylt);
    text-align: center;
    margin-bottom: 2.5rem;
    font-weight: 400;
  }

  .name-group {
    width: 100%;
    max-width: 380px;
    margin-bottom: 1.2rem;
  }
  .name-group label {
    display: block;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .1em;
    color: var(--skylt);
    text-transform: uppercase;
    margin-bottom: .45rem;
  }
  .name-group input {
    width: 100%;
    padding: .85rem 1.1rem;
    background: rgba(74,144,217,.1);
    border: 1.5px solid rgba(74,144,217,.35);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s, background .2s;
  }
  .name-group input:focus { border-color: var(--sky); background: rgba(74,144,217,.18); }
  .name-group input::placeholder { color: var(--slate); }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: .55rem;
    padding: .95rem 2.2rem;
    background: var(--sky);
    color: var(--navy);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: .06em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform .15s, background .15s, box-shadow .15s;
    box-shadow: 0 4px 18px rgba(74,144,217,.35);
  }
  .btn-primary:hover { background: var(--sky2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(74,144,217,.45); }
  .btn-primary:active { transform: translateY(0); }

  /* ── HEADER QUIZ ── */
  .quiz-header {
    width: 100%;
    background: var(--navy2);
    padding: .75rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid rgba(74,144,217,.2);
    position: sticky;
    top: 0;
    z-index: 10;
    flex-shrink: 0;
  }
  .quiz-header-left {
    display: flex;
    align-items: center;
    gap: .7rem;
  }
  .header-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .85rem;
    font-weight: 600;
    color: var(--skylt);
    letter-spacing: .05em;
  }
  .header-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--sky);
  }
  .progress-bar-wrap {
    height: 4px;
    background: rgba(74,144,217,.15);
    width: 100%;
  }
  .progress-bar {
    height: 4px;
    background: var(--sky);
    transition: width .4s ease;
  }

  /* ── PANTALLA PREGUNTA ── */
  #screen-question {
    background: var(--navy);
    padding: 0;
    justify-content: flex-start;
    align-items: stretch;
  }
  .question-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1.2rem 1rem;
    gap: 1.2rem;
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: .8rem;
    width: 100%;
    max-width: 560px;
  }
  .q-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .12em;
    color: var(--sky);
    text-transform: uppercase;
  }
  .q-timer {
    margin-left: auto;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 3px solid var(--sky);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--white);
    transition: border-color .3s, color .3s;
    flex-shrink: 0;
  }
  .q-timer.urgent { border-color: var(--redlt); color: var(--redlt); animation: pulse .6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  .q-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(1.2rem, 4.5vw, 1.65rem);
    font-weight: 700;
    line-height: 1.25;
    text-align: center;
    max-width: 560px;
    width: 100%;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .7rem;
    width: 100%;
    max-width: 560px;
  }
  @media (max-width: 420px) { .options-grid { grid-template-columns: 1fr; } }

  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: .65rem;
    padding: .9rem 1rem;
    border: 2px solid transparent;
    border-radius: 12px;
    background: var(--navy2);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: .92rem;
    font-weight: 500;
    line-height: 1.35;
    cursor: pointer;
    text-align: left;
    transition: background .15s, border-color .15s, transform .12s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt-btn:hover:not(:disabled) { background: rgba(74,144,217,.18); border-color: rgba(74,144,217,.4); transform: translateY(-1px); }
  .opt-btn:active:not(:disabled) { transform: scale(.98); }
  .opt-btn:disabled { cursor: default; }

  .opt-letter {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .82rem;
    font-weight: 700;
    min-width: 22px; height: 22px;
    border-radius: 6px;
    background: rgba(74,144,217,.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: .05rem;
    transition: background .15s;
  }

  .opt-btn.correct { background: rgba(46,125,50,.25); border-color: var(--greenlt); }
  .opt-btn.correct .opt-letter { background: var(--greenlt); color: var(--navy); }
  .opt-btn.wrong   { background: rgba(198,40,40,.2);  border-color: var(--redlt); }
  .opt-btn.wrong   .opt-letter { background: var(--redlt); }
  .opt-btn.selected-correct { background: rgba(46,125,50,.35); border-color: var(--greenlt); }
  .opt-btn.selected-wrong   { background: rgba(198,40,40,.3);  border-color: var(--redlt); animation: shake .35s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* ── FEEDBACK ── */
  .feedback-box {
    width: 100%;
    max-width: 560px;
    border-radius: 12px;
    padding: .9rem 1.1rem;
    font-size: .9rem;
    line-height: 1.5;
    display: none;
  }
  .feedback-box.correct-fb { background: rgba(46,125,50,.2); border: 1.5px solid var(--greenlt); }
  .feedback-box.wrong-fb   { background: rgba(198,40,40,.15); border: 1.5px solid var(--redlt); }
  .feedback-box .fb-title  { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: .3rem; }
  .feedback-box.correct-fb .fb-title { color: var(--greenlt); }
  .feedback-box.wrong-fb   .fb-title { color: var(--redlt); }
  .feedback-box .fb-body   { color: var(--skylt); }

  .btn-next {
    padding: .8rem 2rem;
    background: var(--sky);
    color: var(--navy);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: .06em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: none;
    transition: background .15s, transform .12s;
  }
  .btn-next:hover { background: var(--sky2); transform: translateY(-1px); }

  /* ── RESULTADO FINAL ── */
  #screen-result {
    background: var(--navy);
    position: relative;
    overflow: hidden;
    text-align: center;
    gap: 1.2rem;
  }
  #screen-result::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,144,217,.12) 0%, transparent 65%);
    pointer-events: none;
  }

  .result-emoji { font-size: 3.5rem; line-height: 1; }
  .result-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .82rem;
    font-weight: 700;
    letter-spacing: .15em;
    color: var(--sky);
    text-transform: uppercase;
  }
  .result-score-big {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(4rem, 16vw, 6.5rem);
    font-weight: 900;
    line-height: 1;
    color: var(--sky);
  }
  .result-score-label {
    font-size: .88rem;
    color: var(--skylt);
    margin-top: -.3rem;
  }
  .result-medal {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    padding: .45rem 1.2rem;
    border-radius: 20px;
    display: inline-block;
  }
  .medal-gold   { background: rgba(249,168,37,.2);  border: 1.5px solid var(--gold);   color: var(--gold);   }
  .medal-silver { background: rgba(144,164,174,.2); border: 1.5px solid var(--silver); color: var(--silver); }
  .medal-bronze { background: rgba(141,110,99,.2);  border: 1.5px solid var(--bronze); color: var(--bronze); }
  .medal-ok     { background: rgba(74,144,217,.15); border: 1.5px solid var(--sky);    color: var(--sky);    }

  .result-breakdown {
    width: 100%;
    max-width: 400px;
    background: var(--navy2);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(74,144,217,.2);
  }
  .breakdown-row {
    display: flex;
    align-items: center;
    gap: .7rem;
    padding: .7rem 1rem;
    border-bottom: 1px solid rgba(74,144,217,.1);
    font-size: .88rem;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-icon { font-size: 1rem; flex-shrink: 0; }
  .breakdown-q { color: var(--skylt); flex: 1; text-align: left; line-height: 1.3; }
  .breakdown-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .78rem;
    font-weight: 700;
    padding: .2rem .55rem;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .breakdown-badge.ok  { background: rgba(46,125,50,.25);  color: var(--greenlt); }
  .breakdown-badge.bad { background: rgba(198,40,40,.2);   color: var(--redlt); }

  .btn-retry {
    padding: .75rem 1.8rem;
    background: transparent;
    color: var(--skylt);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .95rem;
    font-weight: 600;
    letter-spacing: .06em;
    border: 1.5px solid rgba(74,144,217,.3);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-retry:hover { border-color: var(--sky); color: var(--sky); }

  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 100;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- ══ INICIO ══════════════════════════════════════════ -->
<div id="screen-start" class="screen active">
  <p class="start-badge">Derecho Civil · Semana 2</p>
  <h1 class="start-title">Quiz de<br><span>Fuentes del Derecho</span></h1>
  <p class="start-sub">8 preguntas · 20 segundos cada una</p>
  <div class="name-group">
    <label for="player-name">Tu nombre</label>
    <input id="player-name" type="text" placeholder="Ej: María González" maxlength="40" autocomplete="off">
  </div>
  <button class="btn-primary" onclick="startQuiz()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    Empezar
  </button>
</div>

<!-- ══ PREGUNTA ════════════════════════════════════════ -->
<div id="screen-question" class="screen">
  <div class="quiz-header">
    <div class="quiz-header-left">
      <span id="hdr-name" class="header-name"></span>
    </div>
    <span id="hdr-score" class="header-score">0 pts</span>
  </div>
  <div class="progress-bar-wrap"><div id="progress-bar" class="progress-bar" style="width:0%"></div></div>

  <div class="question-body">
    <div class="q-meta">
      <span id="q-num" class="q-num"></span>
      <div id="q-timer" class="q-timer">20</div>
    </div>
    <p id="q-text" class="q-text"></p>
    <div id="options-grid" class="options-grid"></div>
    <div id="feedback-box" class="feedback-box">
      <div class="fb-title" id="fb-title"></div>
      <div class="fb-body"  id="fb-body"></div>
    </div>
    <button id="btn-next" class="btn-next" onclick="nextQuestion()">Siguiente →</button>
  </div>
</div>

<!-- ══ RESULTADO ════════════════════════════════════════ -->
<div id="screen-result" class="screen">
  <div id="result-emoji" class="result-emoji"></div>
  <p id="result-name" class="result-name"></p>
  <div id="result-score-big" class="result-score-big"></div>
  <p id="result-score-label" class="result-score-label"></p>
  <div id="result-medal" class="result-medal"></div>
  <div id="result-breakdown" class="result-breakdown"></div>
  <button class="btn-retry" onclick="restartQuiz()">↺ Intentar de nuevo</button>
</div>

<script>
const QUESTIONS = [
  {
    q: "¿Cómo se llama el conjunto formado por la Constitución Nacional más los tratados de DDHH con jerarquía constitucional?",
    opts: [
      "Bloque normativo federal",
      "Bloque de constitucionalidad federal",
      "Pirámide de Kelsen",
      "Sistema difuso"
    ],
    correct: 1,
    fb: "Art. 75 inc. 22 CN — la reforma de 1994 incorporó tratados de DDHH con jerarquía constitucional, formando el bloque de constitucionalidad junto a la CN."
  },
  {
    q: "Un decreto reglamentario del Poder Ejecutivo es ley en sentido...",
    opts: [
      "Formal solamente",
      "Formal y material",
      "Material solamente",
      "Ninguno de los dos"
    ],
    correct: 2,
    fb: "Es norma general emanada de autoridad competente (material), pero no fue sancionada por el Congreso conforme al procedimiento constitucional (no formal)."
  },
  {
    q: "¿Qué ocurre si el Presidente no promulga ni veta un proyecto aprobado dentro de los 10 días hábiles?",
    opts: [
      "El proyecto caduca",
      "Vuelve a las cámaras para nueva votación",
      "Lo resuelve la Corte Suprema",
      "Se considera aprobado (promulgación tácita)"
    ],
    correct: 3,
    fb: "Art. 80 CN — el silencio del Ejecutivo durante el plazo equivale a aprobación tácita. El proyecto pasa a ser ley automáticamente."
  },
  {
    q: "En Argentina, ¿qué juez puede declarar la inconstitucionalidad de una ley?",
    opts: [
      "Solo la Corte Suprema de Justicia",
      "Solo los jueces federales",
      "Cualquier juez de cualquier fuero e instancia",
      "Solo el Tribunal Constitucional"
    ],
    correct: 2,
    fb: "Argentina adoptó el sistema difuso de control de constitucionalidad: cualquier juez ejerce el control en el caso concreto. El efecto es inter partes, no erga omnes."
  },
  {
    q: "¿Cuál es la diferencia entre sistema difuso y sistema concentrado de control constitucional?",
    opts: [
      "En el difuso solo actúa la Corte; en el concentrado cualquier juez",
      "El difuso es el modelo europeo; el concentrado el argentino",
      "En el difuso cualquier juez controla; en el concentrado solo un tribunal especializado",
      "No tienen diferencias prácticas relevantes"
    ],
    correct: 2,
    fb: "En el sistema difuso (Argentina) cualquier juez puede declarar la inconstitucionalidad con efecto inter partes. En el concentrado (Alemania, España) solo un Tribunal Constitucional especial, con efecto erga omnes."
  },
  {
    q: "El Congreso aprueba una ley que otorga una pensión individual a una persona. ¿Cómo se clasifica?",
    opts: [
      "Ley en sentido material y formal",
      "Ley en sentido formal pero no material",
      "Ley en sentido material pero no formal",
      "No es ley en ningún sentido"
    ],
    correct: 1,
    fb: "Es ley formal porque fue sancionada por el Congreso con el procedimiento constitucional. No es ley material porque no es general y abstracta: se agota en un caso individual concreto."
  },
  {
    q: "¿Qué mayoría necesita el Congreso para insistir en un proyecto vetado por el Ejecutivo?",
    opts: [
      "Mayoría simple en ambas cámaras",
      "Mayoría absoluta en ambas cámaras",
      "Dos tercios de los votos en cada Cámara",
      "Mayoría simple solo en Diputados"
    ],
    correct: 2,
    fb: "Art. 83 CN — si ambas Cámaras reúnen 2/3 de sus votos, el proyecto se convierte en ley aunque el Ejecutivo se oponga, y debe ser promulgado sin posibilidad de nuevo veto."
  },
  {
    q: "Según el Art. 31 CN, ¿qué conforma la 'ley suprema de la Nación'?",
    opts: [
      "Solo la Constitución Nacional",
      "Las leyes del Congreso y los decretos del Ejecutivo",
      "La CN, las leyes del Congreso dictadas en su consecuencia y los tratados",
      "Únicamente las leyes del Congreso"
    ],
    correct: 2,
    fb: "Art. 31 CN establece la supremacía de la Constitución, las leyes nacionales y los tratados internacionales. La reforma de 1994 añadió que los tratados de DDHH del Art. 75 inc. 22 tienen jerarquía constitucional."
  }
];

const TIMER_SECS   = 20;
const PTS_FAST     = 100;
const PTS_SLOW     = 50;
const LETTERS      = ['A','B','C','D'];

let playerName = '';
let currentQ   = 0;
let score      = 0;
let timerInt   = null;
let timeLeft   = TIMER_SECS;
let answered   = false;
let results    = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  const inp = document.getElementById('player-name').value.trim();
  if (!inp) { document.getElementById('player-name').focus(); return; }
  playerName = inp;
  currentQ = 0; score = 0; results = [];
  showScreen('screen-question');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  timeLeft = TIMER_SECS;
  const q = QUESTIONS[currentQ];

  document.getElementById('hdr-name').textContent = playerName;
  document.getElementById('hdr-score').textContent = score + ' pts';
  document.getElementById('q-num').textContent = `Pregunta ${currentQ + 1} / ${QUESTIONS.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-bar').style.width = (currentQ / QUESTIONS.length * 100) + '%';

  const timer = document.getElementById('q-timer');
  timer.textContent = TIMER_SECS;
  timer.classList.remove('urgent');

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none';
  fb.className = 'feedback-box';
  document.getElementById('btn-next').style.display = 'none';

  // Shuffle options keeping track of correct answer
  const indices = [0,1,2,3];
  const shuffled = [...indices].sort(() => Math.random() - .5);
  const correctShuffled = shuffled.indexOf(q.correct);

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  shuffled.forEach((origIdx, dispIdx) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.dataset.orig = origIdx;
    btn.dataset.correct = origIdx === q.correct ? '1' : '0';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[dispIdx]}</span>${q.opts[origIdx]}`;
    btn.onclick = () => selectAnswer(btn, origIdx === q.correct);
    grid.appendChild(btn);
  });

  clearInterval(timerInt);
  timerInt = setInterval(() => {
    timeLeft--;
    timer.textContent = timeLeft;
    if (timeLeft <= 5) timer.classList.add('urgent');
    if (timeLeft <= 0) { clearInterval(timerInt); timeExpired(); }
  }, 1000);
}

function selectAnswer(btn, isCorrect) {
  if (answered) return;
  answered = true;
  clearInterval(timerInt);

  const timeBonus = timeLeft > 10 ? PTS_FAST : PTS_SLOW;
  const pts = isCorrect ? timeBonus : 0;
  score += pts;
  results.push({ q: QUESTIONS[currentQ].q, correct: isCorrect });

  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('correct');
  });

  if (isCorrect) {
    btn.classList.add('selected-correct');
  } else {
    btn.classList.add('selected-wrong');
  }

  showFeedback(isCorrect);
  document.getElementById('hdr-score').textContent = score + ' pts';
}

function timeExpired() {
  if (answered) return;
  answered = true;
  results.push({ q: QUESTIONS[currentQ].q, correct: false });
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('correct');
  });
  showFeedback(false, true);
}

function showFeedback(isCorrect, expired = false) {
  const fb  = document.getElementById('feedback-box');
  const tit = document.getElementById('fb-title');
  const bod = document.getElementById('fb-body');
  fb.style.display = 'block';
  if (expired) {
    fb.className = 'feedback-box wrong-fb';
    tit.textContent = '⏱ Tiempo agotado';
  } else if (isCorrect) {
    fb.className = 'feedback-box correct-fb';
    tit.textContent = timeLeft > 10 ? '¡Excelente! +100 pts' : '¡Correcto! +50 pts';
  } else {
    fb.className = 'feedback-box wrong-fb';
    tit.textContent = 'Incorrecto';
  }
  bod.textContent = QUESTIONS[currentQ].fb;
  document.getElementById('btn-next').style.display = 'inline-block';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  showScreen('screen-result');
  const pct = score / (QUESTIONS.length * PTS_FAST);
  const correct = results.filter(r => r.correct).length;

  let emoji, medalClass, medalText;
  if (correct === QUESTIONS.length) {
    emoji = '🏆'; medalClass = 'medal-gold';   medalText = '¡Puntaje perfecto!';
  } else if (correct >= 6) {
    emoji = '⭐'; medalClass = 'medal-silver'; medalText = 'Muy bien logrado';
  } else if (correct >= 4) {
    emoji = '👍'; medalClass = 'medal-bronze'; medalText = 'Buen intento';
  } else {
    emoji = '📚'; medalClass = 'medal-ok';     medalText = 'Seguí repasando';
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-name').textContent  = playerName.toUpperCase();
  document.getElementById('result-score-big').textContent = score;
  document.getElementById('result-score-label').textContent = `${correct} de ${QUESTIONS.length} correctas`;
  const medal = document.getElementById('result-medal');
  medal.className = 'result-medal ' + medalClass;
  medal.textContent = medalText;

  const bd = document.getElementById('result-breakdown');
  bd.innerHTML = results.map((r, i) => `
    <div class="breakdown-row">
      <span class="breakdown-icon">${r.correct ? '✅' : '❌'}</span>
      <span class="breakdown-q">P${i+1}: ${QUESTIONS[i].q.substring(0, 55)}${QUESTIONS[i].q.length > 55 ? '…' : ''}</span>
      <span class="breakdown-badge ${r.correct ? 'ok' : 'bad'}">${r.correct ? 'OK' : 'MAL'}</span>
    </div>
  `).join('');

  registrarResultado(playerName, score, correct);
  if (correct >= 6) launchConfetti();
}

function launchConfetti() {
  const colors = ['#4A90D9','#A8CFEE','#FFFFFF','#2E7D32','#E65100'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random()*100}vw;
        top: -10px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration: ${1.5 + Math.random()*2}s;
        animation-delay: ${Math.random()*.8}s;
        transform: rotate(${Math.random()*360}deg);
        width: ${6 + Math.random()*6}px;
        height: ${6 + Math.random()*6}px;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 30);
  }
}

function restartQuiz() {
  currentQ = 0; score = 0; results = [];
  showScreen('screen-question');
  renderQuestion();
}

// Enter key en el input de nombre
document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') startQuiz();
});

}
